<!DOCTYPE html><html><head><meta charset="utf-8"><meta name=viewport content="width=device-width,initial-scale=1">
<title>Imposter Party</title><style>
*{box-sizing:border-box}body{margin:0;font:16px system-ui;background:linear-gradient(135deg,#0f172a,#312e81);min-height:100vh;display:grid;place-items:center;color:#fff}
.c{width:min(95vw,460px);background:rgba(255,255,255,.1);backdrop-filter:blur(10px);padding:22px;border-radius:20px;box-shadow:0 10px 30px #0005}
h1,h2{text-align:center}input,button{width:100%;padding:12px;margin:6px 0;border:none;border-radius:12px}
input{background:#ffffff18;color:#fff}button{background:#7c3aed;color:#fff;font-weight:700;cursor:pointer}button:hover{filter:brightness(1.1)}
#game,#end{display:none}.card{border:2px dashed #ffffff55;border-radius:16px;padding:18px;text-align:center;min-height:150px;display:grid;place-items:center;transition:.3s}
.small{opacity:.8;font-size:.9em}
</style></head><body><div class=c>
<div id=s><h1>🎭 Imposter Party</h1><p>Enter 3–6 player names.</p><input id=n type=number min=3 max=6 value=4><div id=list></div><button onclick=start()>Start Game</button></div>
<div id=game><h2 id=p></h2><div class=card id=card>Pass the device.<br><span class=small>Tap Reveal when ready.</span></div><button onclick=reveal()>Reveal</button><button id=next style="display:none" onclick=go()>Hide & Next</button></div>
<div id=end><h2>🗣️ Discuss!</h2><h1 id="timer">02:00</h1><p>Everyone has seen their role. Find the Imposter!</p><button onclick="startTimer()">Start 2 Minute Timer</button><button onclick=round()>New Round</button><button onclick=location.reload()>Restart</button></div>
</div><script>
const words=[["Pizza","Common meal"],["Tiger","Wild animal"],["Laptop","Electronic device"],["Apple","Popular fruit"],["Canada","Nation"],["Guitar","Makes music"],["Football","Competitive game"],["Car","Transportation"],["School","Education related"],["Hammer","Hand tool"],["Banana","Tropical fruit"],["Bridge","Structure"],["Doctor","Healthcare job"],["Phone","Everyday tech"],["Shark","Sea creature"],["Pencil","School supply"],["Camera","Captures memories"],["Train","Public transport"],["Cake","Sweet treat"],["Volcano","Natural feature"],["Elephant","Large creature"],["Airplane","Air transport"],["Bicycle","Personal transport"],["Computer","Technology"],["Milk","Dairy item"],["Soccer","Popular sport"],["Tree","Plant"],["Castle","Historic building"],["Robot","Machine"],["Beach","Outdoor place"]];
let players=[],idx,imp,w;
function build(){list.innerHTML="";let c=Math.max(3,Math.min(6,+n.value));for(let i=1;i<=c;i++)list.innerHTML+=`<input value="Player ${i}">`;}
n.oninput=build;build();
function newGame(){idx=0;imp=Math.floor(Math.random()*players.length);w=words[Math.floor(Math.random()*words.length)];show();}
function start(){players=[...list.children].map(x=>x.value||"Player");s.style.display="none";game.style.display="block";newGame();}
function show(){p.textContent=players[idx];card.innerHTML="Pass the device.<br><span class=small>Tap Reveal when ready.</span>";document.querySelector("button[onclick=\"reveal()\"]").style.display="block";next.style.display="none";}
function reveal(){document.querySelector("button[onclick=\"reveal()\"]").style.display="none";card.innerHTML=idx==imp?`<h3>🕵️ IMPOSTER</h3><p>Hint: <b>${w[1]}</b></p>`:`<h3>✅ WORD</h3><p><b>${w[0]}</b></p>`;next.style.display="block";}
